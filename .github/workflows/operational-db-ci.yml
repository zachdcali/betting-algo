name: Operational database contract

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: betting_algo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d betting_algo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install focused contract dependencies
        run: python -m pip install pytest "psycopg[binary]" pandas numpy

      - name: Verify migration, import, reconciliation, and live records
        env:
          TEST_DATABASE_URL: postgresql://postgres:test@127.0.0.1:5432/betting_algo_test
        run: >-
          python -m pytest -q
          tests/test_operational_schema.py
          tests/test_operational_repository.py
          tests/test_operational_import.py
          tests/test_model_registry_postgres.py
          tests/test_operational_postgres_integration.py
          tests/test_operational_runtime.py
          tests/test_live_records.py
          tests/test_pending_reconciliation.py

      - name: Verify static dashboard contracts
        run: |
          node --check docs/dashboard.js
          node --test tests/dashboard_logic.test.cjs tests/dashboard_contract.test.cjs

      - name: Check patch whitespace
        run: git diff --check
