name: Hourly betting pipeline

# Paper-trading autonomy: every run logs predictions for the current Bovada
# slate (features from the canonical Supabase store — no Tennis Abstract),
# settles pending matches, and commits the updated logs back to the repo so
# nothing is lost on the ephemeral runner. Odds age is bounded by the cadence.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
    # GitHub throttles busy schedule slots (~50% delivery observed); a second
    # offset keeps effective cadence hourly
    - cron: "47 * * * *"

concurrency:
  group: hourly-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore model artifacts
        id: models
        uses: actions/cache@v4
        with:
          path: results/professional_tennis
          key: models-v1

      - name: Download model artifacts (cache miss)
        if: steps.models.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download models-v1 --pattern "models-v1.tar.gz" --output /tmp/models.tar.gz
          tar -xzf /tmp/models.tar.gz
          rm /tmp/models.tar.gz

      - name: Configure store credentials
        run: echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.supabase

      - name: Run pipeline (paper mode, store-backed features)
        working-directory: production
        # full paper mode: bets are CSV rows (no real money) and settlement must
        # WRITE results. ITF unskipped 2026-07-09 (store-mode + ITF caching changed
        # the budget math — 35/52 of the board was ITF); revert if runs exceed ~40m
        run: python -u main.py

      - name: Commit updated logs
        if: always()
        run: |
          git config user.name "pipeline-bot"
          git config user.email "pipeline-bot@users.noreply.github.com"
          # -f: production/logs is gitignored locally, but cloud runs MUST persist
          # the shadow predictions + audit trail or they die with the runner VM
          git add -A -f production/prediction_log.csv production/prediction_snapshots.csv \
                        production/odds_history.csv production/logs data/atp_rankings.csv \
                        data/atp_heights.json || true
          git diff --cached --quiet && echo "no log changes" && exit 0
          git commit -m "Hourly run: logs $(date -u +%Y-%m-%dT%H:%MZ)"
          # Race-resilient push: a concurrent push (dev session) can conflict the
          # rebase. Resolve log-file conflicts with THIS run's copies (freshest
          # run data; anything dropped re-derives next run — settlement re-reads
          # official pages). Last resort: park logs on a branch, never lose them.
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              exit 0
            fi
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -n "$CONFLICTS" ]; then
              git checkout --theirs -- $CONFLICTS || true
              git add -A -f $CONFLICTS || true
              GIT_EDITOR=true git rebase --continue || git rebase --abort || true
            fi
            sleep 5
          done
          BRANCH="runner-logs-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "::warning::push race unresolved after 3 attempts — parking logs on $BRANCH"
          git push origin "HEAD:$BRANCH"
