name: Hourly betting pipeline

# Paper-trading autonomy: every run logs predictions for the current Bovada
# slate (active TA-based features plus canonical-store history), settles
# pending matches, and publishes an additive durable-state generation before
# the ephemeral runner exits. Git remains a secondary audit/checkpoint path.
on:
  workflow_dispatch:
  schedule:
    # These are best-effort target slots. GitHub Actions may delay or omit a
    # scheduled delivery, so neither target nor an hourly cadence is guaranteed.
    - cron: "17 * * * *"
    # The second target reduces expected latency; it is not a delivery guarantee.
    - cron: "47 * * * *"

concurrency:
  group: hourly-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore model artifacts
        id: models
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: results/professional_tennis
          key: models-v1-${{ hashFiles('production/models/model_registry.json') }}

      - name: Download model artifacts (cache miss)
        if: steps.models.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_RELEASE_SHA256: a828618d2f5623b81a9868d9bdc927ba875c587fe79aa2aaac19cf913e2bb6a5
        run: |
          gh release download models-v1 --pattern "models-v1.tar.gz" --output /tmp/models.tar.gz
          python production/models/extract_release.py \
            --archive /tmp/models.tar.gz \
            --destination-root . \
            --expected-sha256 "$MODEL_RELEASE_SHA256"
          rm /tmp/models.tar.gz

      - name: Validate promoted model registry and artifacts
        # Prevent an immutable Actions cache or stale release asset from
        # silently serving a different artifact set after a registry change.
        run: python production/models/validate_registry.py --artifact-scope promoted

      - name: Configure store credentials
        run: echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.supabase

      - name: Hydrate durable operational state
        # A prior run may have synced successfully but lost its git push race.
        # Merge that durable state before settlement/dedupe decisions begin.
        run: python production/dashboard_sync.py --hydrate

      - name: Run pipeline (paper mode, store-backed features)
        working-directory: production
        env:
          # A green cloud run must have published its durable state. Local runs
          # remain permissive unless this flag is explicitly enabled.
          REQUIRE_DURABLE_STATE: "1"
        # full paper mode: bets are CSV rows (no real money) and settlement must
        # WRITE results. ITF unskipped 2026-07-09 (store-mode + ITF caching changed
        # the budget math — 35/52 of the board was ITF); revert if runs exceed ~40m
        run: python -u main.py

      - name: Commit updated logs
        if: always()
        run: |
          git config user.name "pipeline-bot"
          git config user.email "pipeline-bot@users.noreply.github.com"
          # -f: production/logs is gitignored locally, but cloud runs MUST persist
          # the shadow predictions + audit trail or they die with the runner VM
          git add -A -f production/prediction_log.csv production/prediction_snapshots.csv \
                        production/odds_history.csv production/logs \
                        ':(exclude)production/logs/betting.db' data/atp_rankings.csv \
                        data/atp_heights.json data/atp_hands.json || true
          PROFILE_LOOKUP_META=data/atp_profile_lookup_meta.json
          if [ -e "$PROFILE_LOOKUP_META" ] || \
             git ls-files --error-unmatch "$PROFILE_LOOKUP_META" >/dev/null 2>&1; then
            git add -A -f -- "$PROFILE_LOOKUP_META"
          fi
          # SQLite is a derived local read model. Committing its binary churn
          # causes avoidable rebase conflicts and it is rebuilt from CSV logs.
          git restore --worktree production/logs/betting.db || true
          UNSTAGED=$(git diff --name-only)
          if [ -n "$UNSTAGED" ]; then
            echo "::error::unexpected tracked runtime mutations were not checkpointed"
            echo "$UNSTAGED"
            exit 1
          fi
          git diff --cached --quiet && echo "no log changes" && exit 0
          git commit -m "Hourly run: logs $(date -u +%Y-%m-%dT%H:%MZ)"
          # Race-resilient push: a concurrent push (dev session) can conflict the
          # rebase. Resolve log-file conflicts with THIS run's copies (freshest
          # run data; anything dropped re-derives next run — settlement re-reads
          # official pages). Last resort: park logs on a branch, never lose them.
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              exit 0
            fi
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -n "$CONFLICTS" ]; then
              git checkout --theirs -- $CONFLICTS || true
              git add -A -f $CONFLICTS || true
              GIT_EDITOR=true git rebase --continue || git rebase --abort || true
            fi
            sleep 5
          done
          BRANCH="runner-logs-$(date -u +%Y%m%dT%H%M%SZ)"
          echo "::warning::push race unresolved after 3 attempts — parking logs on $BRANCH"
          git push origin "HEAD:$BRANCH"
          # The data is recoverable, but main did not advance. Never paint this
          # operational failure green.
          exit 1
