version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "16:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      safe-python-updates:
        patterns:
          - "*"
        # These packages can change inference, deserialization, numerical and
        # dataframe semantics, live scraping, database I/O, or service runtime
        # behavior. Keep each update standalone so its required parity or
        # integration gate is visible.
        exclude-patterns:
          - torch
          - scikit-learn
          - xgboost
          - catboost
          - lightgbm
          - numpy
          - pandas
          - playwright
          - "psycopg*"
          - requests
          - beautifulsoup4
          - lxml
          - flask
          - gunicorn
          - google-cloud-storage
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "16:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
