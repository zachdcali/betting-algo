version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "16:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      safe-python-updates:
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "16:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
